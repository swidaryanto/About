<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --panel-bg: #f3f3f3;
        --panel-line: #d6d6d6;
        --spinner-track: #bdbdbd;
        --spinner-head: #3f3f3f;
        --braille-spinner: #4a4a4a;
        --ease-utility: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-decorative: cubic-bezier(0.77, 0, 0.175, 1);
        --duration-utility-fast: 120ms;
        --duration-utility: 180ms;
        --duration-decorative: 4.8s;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow: hidden;
        background: var(--bg);
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      body[data-motion="calm"] {
        --duration-utility-fast: 96ms;
        --duration-utility: 140ms;
        --duration-decorative: 7.2s;
      }

      .loading-card {
        position: fixed;
        width: 180px;
        height: 80px;
        border-radius: 16px;
        border: 1px solid var(--panel-line);
        background: var(--panel-bg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        display: grid;
        place-items: center;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .braille-panel {
        position: fixed;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        width: 120px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--panel-line);
        background: var(--panel-bg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        color: var(--braille-spinner);
        user-select: none;
        pointer-events: auto;
        cursor: grab;
        touch-action: none;
      }

      .braille-panel.dragging {
        cursor: grabbing;
      }

      .braille-slot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 22px;
      }

      .loading-braille {
        font-family: "IBM Plex Mono", "SF Mono", "JetBrains Mono", "Cascadia Mono", monospace;
        font-size: 20px;
        line-height: 1;
        letter-spacing: 0;
        text-rendering: geometricPrecision;
      }

      .loading-braille-trail {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.1ch;
        height: 1em;
      }

      .loading-braille-layer {
        position: absolute;
        inset: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .loading-braille-ghost-1 {
        opacity: 0.58;
        transform: translateX(-0.015em);
      }

      .loading-braille-ghost-2 {
        opacity: 0.3;
        transform: translateX(-0.03em);
      }

      .loading-braille-ghost-3 {
        opacity: 0.14;
        transform: translateX(-0.045em);
      }

      body[data-motion="calm"] .loading-braille-ghost-1 {
        opacity: 0.42;
      }

      body[data-motion="calm"] .loading-braille-ghost-2 {
        opacity: 0.22;
      }

      body[data-motion="calm"] .loading-braille-ghost-3 {
        opacity: 0.1;
      }

      .curated-title {
        position: fixed;
        padding: 0;
        color: #171717;
        font-family: "Roboto Flex", "Inter", sans-serif;
        font-size: 28px;
        font-weight: 520;
        letter-spacing: -0.015em;
        line-height: 1;
        cursor: grab;
        user-select: none;
        touch-action: none;
        will-change: transform;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        font-optical-sizing: auto;
        font-variation-settings: "opsz" 28, "wght" 520;
        animation: curatedPulse var(--duration-decorative) var(--ease-decorative) infinite;
      }

      .curated-title.dragging {
        cursor: grabbing;
      }

      .loading-card.dragging {
        cursor: grabbing;
      }

      .spinners {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 47px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 3px solid var(--spinner-track);
        border-top-color: var(--spinner-head);
        animation: spin 760ms linear infinite;
      }

      .spinner:first-child {
        animation-duration: 1520ms;
      }

      .spinner:nth-child(2) {
        animation-duration: 820ms;
      }

      .toast-panel {
        position: fixed;
        width: min(420px, calc(100vw - 44px));
        border-radius: 14px;
        border: 1px solid var(--panel-line);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .toast-panel.dragging {
        cursor: grabbing;
      }

      .toast-stage {
        position: relative;
        height: 170px;
        border-bottom: 1px solid var(--panel-line);
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .toast-layer {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        padding: 14px;
      }

      .toast-item {
        position: absolute;
        left: 14px;
        right: 14px;
        top: 50%;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid #dbdbdb;
        background: #f8f8f8;
        padding: 12px 14px;
        color: #1d1d1d;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.3;
        letter-spacing: -0.005em;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.05),
          0 10px 24px rgba(0, 0, 0, 0.09);
      }

      .toast-progress {
        position: absolute;
        left: 0;
        top: 0;
        height: 2px;
        width: 100%;
        transform-origin: left center;
        background: linear-gradient(90deg, #8d8d8d 0%, #bdbdbd 100%);
        opacity: 0.9;
      }

      .toast-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 12px;
      }

      .toast-controls-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast-controls-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toast-control {
        height: 36px;
        min-width: 96px;
        padding: 0 10px;
        border: 1px solid var(--panel-line);
        border-radius: 9px;
        background: #f8f8f8;
        color: #232323;
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.005em;
        cursor: pointer;
        transition:
          transform var(--duration-utility-fast) var(--ease-utility),
          background var(--duration-utility) var(--ease-utility),
          box-shadow var(--duration-utility) var(--ease-utility);
      }

      .toast-control:hover {
        background: #efefef;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }

      .toast-control:active {
        transform: scale(0.975);
      }

      .toast-reset {
        min-width: auto;
        padding: 0 4px;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        color: #b25e5e;
      }

      .toast-reset:hover {
        background: transparent;
        box-shadow: none;
        color: #9f4d4d;
      }

      .toast-reset:active {
        transform: scale(0.985);
      }

      .toast-select-wrap {
        position: relative;
      }

      .toast-select-wrap::after {
        content: "";
        position: absolute;
        right: 11px;
        top: 50%;
        width: 6px;
        height: 6px;
        border-right: 1.8px solid #111;
        border-bottom: 1.8px solid #111;
        transform: translateY(-62%) rotate(45deg);
        pointer-events: none;
      }

      select.toast-control {
        appearance: none;
        padding-right: 24px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes curatedPulse {
        0%,
        100% {
          font-variation-settings: "opsz" 28, "wght" 500;
          letter-spacing: -0.015em;
          transform: translateY(0);
        }

        50% {
          font-variation-settings: "opsz" 28, "wght" 760;
          letter-spacing: -0.03em;
          transform: translateY(-0.5px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .curated-title {
          animation: none;
        }

        .loading-braille {
          animation: none;
        }
      }

      @media (max-width: 760px) {
        .loading-card {
          width: 180px;
          border-radius: 14px;
          height: 80px;
        }

        .spinners {
          gap: 30px;
        }

        .spinner {
          width: 21px;
          height: 21px;
          border-width: 3px;
        }

        .toast-panel {
          width: min(420px, calc(100vw - 16px));
        }

        .toast-stage {
          height: 130px;
        }

        .toast-item {
          font-size: 14px;
        }

        .toast-control {
          height: 34px;
          min-width: 92px;
          font-size: 12px;
          padding: 0 8px;
        }

        .braille-panel {
          width: 104px;
          height: 40px;
          border-radius: 10px;
          gap: 12px;
        }

        .braille-slot {
          width: 24px;
        }

        .loading-braille {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import React, { useEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.2.0";
      import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
      import { AnimatePresence, motion, useReducedMotion } from "https://esm.sh/framer-motion@11.2.10?deps=react@18.2.0";

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getDefaultLoadingPos() {
        return { x: window.innerWidth * 0.5 - 90, y: window.innerHeight * 0.5 - 40 };
      }

      function getDefaultBraillePanelPos() {
        if (window.innerWidth <= 760) return { x: 12, y: 12 };
        return { x: 16, y: 20 };
      }

      function getLoadingCardOffset(index) {
        return { x: index * 24, y: index * 18 };
      }

      function getDefaultTitlePos() {
        return { x: window.innerWidth * 0.5 - 110, y: 24 };
      }

      function getDefaultToastPos() {
        const width = Math.min(420, Math.max(240, window.innerWidth - 44));
        const height = 252;
        return { x: window.innerWidth - width - 28, y: window.innerHeight * 0.5 - height * 0.5 };
      }

      function useDraggablePosition(key, defaultPosFactory, motionMode = "normal") {
        const ref = useRef(null);
        const [pos, setPos] = useState(() => defaultPosFactory());
        const [dragging, setDragging] = useState(false);
        const drag = useRef({
          active: false,
          offsetX: 0,
          offsetY: 0,
          lastX: 0,
          lastY: 0,
          lastTime: 0,
          vx: 0,
          vy: 0,
          rafId: 0
        });

        useEffect(() => {
          const raw = localStorage.getItem(key);
          if (!raw) return;
          try {
            const parsed = JSON.parse(raw);
            if (typeof parsed.x === "number" && typeof parsed.y === "number") {
              setPos({ x: parsed.x, y: parsed.y });
            }
          } catch {
            localStorage.removeItem(key);
          }
        }, [key]);

        useEffect(() => {
          localStorage.setItem(key, JSON.stringify(pos));
        }, [key, pos]);

        useEffect(() => {
          const onMove = (event) => {
            if (!drag.current.active || !ref.current) return;
            const rect = ref.current.getBoundingClientRect();
            const left = event.clientX - drag.current.offsetX;
            const top = event.clientY - drag.current.offsetY;
            const nextX = clamp(left, 0, window.innerWidth - rect.width);
            const nextY = clamp(top, 0, window.innerHeight - rect.height);
            const now = performance.now();
            const deltaMs = Math.max(1, now - drag.current.lastTime);
            drag.current.vx = (event.clientX - drag.current.lastX) / deltaMs;
            drag.current.vy = (event.clientY - drag.current.lastY) / deltaMs;
            drag.current.lastX = event.clientX;
            drag.current.lastY = event.clientY;
            drag.current.lastTime = now;
            setPos({ x: nextX, y: nextY });
          };

          const onUp = () => {
            const shouldSnap = Math.hypot(drag.current.vx, drag.current.vy) > 0.01;
            drag.current.active = false;
            setDragging(false);
            if (!shouldSnap || !ref.current) return;

            const rect = ref.current.getBoundingClientRect();
            const minX = 0;
            const minY = 0;
            const maxX = Math.max(0, window.innerWidth - rect.width);
            const maxY = Math.max(0, window.innerHeight - rect.height);
            const motionMomentum = motionMode === "calm" ? 14 : 22;
            const motionFrictionBase = motionMode === "calm" ? 0.8 : 0.86;
            const boundarySpring = motionMode === "calm" ? 0.16 : 0.22;
            let vx = drag.current.vx * motionMomentum;
            let vy = drag.current.vy * motionMomentum;
            let x = rect.left;
            let y = rect.top;
            let last = performance.now();

            const animate = (now) => {
              const dt = Math.min(33, now - last);
              last = now;
              const friction = Math.pow(motionFrictionBase, dt / 16);
              x += vx * (dt / 16);
              y += vy * (dt / 16);
              vx *= friction;
              vy *= friction;

              if (x < minX || x > maxX) {
                const targetX = clamp(x, minX, maxX);
                vx += (targetX - x) * boundarySpring;
              }
              if (y < minY || y > maxY) {
                const targetY = clamp(y, minY, maxY);
                vy += (targetY - y) * boundarySpring;
              }

              x = clamp(x, minX - 8, maxX + 8);
              y = clamp(y, minY - 8, maxY + 8);
              setPos({ x: clamp(x, minX, maxX), y: clamp(y, minY, maxY) });

              if (Math.hypot(vx, vy) < (motionMode === "calm" ? 0.015 : 0.02)) {
                drag.current.rafId = 0;
                return;
              }
              drag.current.rafId = requestAnimationFrame(animate);
            };

            if (drag.current.rafId) cancelAnimationFrame(drag.current.rafId);
            drag.current.rafId = requestAnimationFrame(animate);
          };

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp);
          window.addEventListener("pointercancel", onUp);
          return () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            window.removeEventListener("pointercancel", onUp);
            if (drag.current.rafId) cancelAnimationFrame(drag.current.rafId);
          };
        }, [motionMode]);

        useEffect(() => {
          const onResize = () => {
            if (!ref.current) return;
            const rect = ref.current.getBoundingClientRect();
            setPos((prev) => ({
              x: clamp(prev.x, 0, window.innerWidth - rect.width),
              y: clamp(prev.y, 0, window.innerHeight - rect.height)
            }));
          };
          window.addEventListener("resize", onResize);
          return () => window.removeEventListener("resize", onResize);
        }, []);

        const onPointerDown = (event) => {
          if (!ref.current) return;
          if (drag.current.rafId) {
            cancelAnimationFrame(drag.current.rafId);
            drag.current.rafId = 0;
          }
          const rect = ref.current.getBoundingClientRect();
          drag.current.active = true;
          drag.current.offsetX = event.clientX - rect.left;
          drag.current.offsetY = event.clientY - rect.top;
          drag.current.lastX = event.clientX;
          drag.current.lastY = event.clientY;
          drag.current.lastTime = performance.now();
          drag.current.vx = 0;
          drag.current.vy = 0;
          setDragging(true);
          event.currentTarget.setPointerCapture(event.pointerId);
        };

        return { ref, pos, dragging, onPointerDown };
      }

      function LoadingCard({ card, dragging, isTop, onPointerDown, onDuplicate, entranceReady, entranceDelay, motionMode }) {
        return React.createElement(
          motion.section,
          {
            className: `loading-card${dragging ? " dragging" : ""}`,
            style: {
              left: `${card.pos.x}px`,
              top: `${card.pos.y}px`,
              zIndex: dragging || isTop ? 3 : 2
            },
            onPointerDown,
            onDoubleClick: onDuplicate,
            initial: { opacity: 0, y: 10, scale: 0.98 },
            animate: { opacity: entranceReady ? 1 : 0, y: entranceReady ? 0 : 10, scale: entranceReady ? 1 : 0.98 },
            transition: {
              duration: motionMode === "calm" ? 0.34 : 0.42,
              delay: entranceDelay,
              ease: [0.22, 1, 0.36, 1]
            },
            "aria-label": "Loading"
          },
          React.createElement(
            "div",
            { className: "spinners" },
            React.createElement("div", { className: "spinner", "aria-hidden": "true" }),
            React.createElement("div", { className: "spinner", "aria-hidden": "true" })
          )
        );
      }

      function LoadingStack({ motionMode, entranceReady }) {
        const [cards, setCards] = useState(() => [{ id: 1, pos: getDefaultLoadingPos() }]);
        const drag = useRef({
          active: false,
          id: null,
          offsetX: 0,
          offsetY: 0,
          lastX: 0,
          lastY: 0,
          lastTime: 0,
          vx: 0,
          vy: 0,
          rafId: 0
        });
        const [activeId, setActiveId] = useState(null);
        const nextId = useRef(1);

        useEffect(() => {
          const onMove = (event) => {
            if (!drag.current.active) return;
            const now = performance.now();
            const deltaMs = Math.max(1, now - drag.current.lastTime);
            drag.current.vx = (event.clientX - drag.current.lastX) / deltaMs;
            drag.current.vy = (event.clientY - drag.current.lastY) / deltaMs;
            drag.current.lastX = event.clientX;
            drag.current.lastY = event.clientY;
            drag.current.lastTime = now;
            setCards((prev) =>
              prev.map((card) => {
                if (card.id !== drag.current.id) return card;
                const nextX = clamp(event.clientX - drag.current.offsetX, 0, window.innerWidth - 180);
                const nextY = clamp(event.clientY - drag.current.offsetY, 0, window.innerHeight - 80);
                return { ...card, pos: { x: nextX, y: nextY } };
              })
            );
          };

          const onUp = () => {
            const releaseId = drag.current.id;
            const releaseVelocity = Math.hypot(drag.current.vx, drag.current.vy);
            drag.current.active = false;
            drag.current.id = null;
            setActiveId(null);
            if (!releaseId || releaseVelocity <= 0.01) return;

            const motionMomentum = motionMode === "calm" ? 14 : 22;
            const motionFrictionBase = motionMode === "calm" ? 0.8 : 0.86;
            const boundarySpring = motionMode === "calm" ? 0.16 : 0.22;
            let vx = drag.current.vx * motionMomentum;
            let vy = drag.current.vy * motionMomentum;
            let x = 0;
            let y = 0;
            const width = 180;
            const height = 80;
            setCards((prev) => {
              const current = prev.find((card) => card.id === releaseId);
              if (!current) return prev;
              x = current.pos.x;
              y = current.pos.y;
              return prev;
            });
            let last = performance.now();

            const animate = (now) => {
              const dt = Math.min(33, now - last);
              last = now;
              const minX = 0;
              const minY = 0;
              const maxX = Math.max(0, window.innerWidth - width);
              const maxY = Math.max(0, window.innerHeight - height);
              const friction = Math.pow(motionFrictionBase, dt / 16);
              x += vx * (dt / 16);
              y += vy * (dt / 16);
              vx *= friction;
              vy *= friction;

              if (x < minX || x > maxX) {
                const targetX = clamp(x, minX, maxX);
                vx += (targetX - x) * boundarySpring;
              }
              if (y < minY || y > maxY) {
                const targetY = clamp(y, minY, maxY);
                vy += (targetY - y) * boundarySpring;
              }

              x = clamp(x, minX - 8, maxX + 8);
              y = clamp(y, minY - 8, maxY + 8);
              setCards((prev) =>
                prev.map((card) =>
                  card.id === releaseId ? { ...card, pos: { x: clamp(x, minX, maxX), y: clamp(y, minY, maxY) } } : card
                )
              );

              if (Math.hypot(vx, vy) < (motionMode === "calm" ? 0.015 : 0.02)) {
                drag.current.rafId = 0;
                return;
              }
              drag.current.rafId = requestAnimationFrame(animate);
            };

            if (drag.current.rafId) cancelAnimationFrame(drag.current.rafId);
            drag.current.rafId = requestAnimationFrame(animate);
          };

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp);
          window.addEventListener("pointercancel", onUp);
          return () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            window.removeEventListener("pointercancel", onUp);
            if (drag.current.rafId) cancelAnimationFrame(drag.current.rafId);
          };
        }, [motionMode]);

        const startDrag = (id) => (event) => {
          if (event.button !== 0) return;
          if (drag.current.rafId) {
            cancelAnimationFrame(drag.current.rafId);
            drag.current.rafId = 0;
          }
          const rect = event.currentTarget.getBoundingClientRect();
          drag.current.active = true;
          drag.current.id = id;
          drag.current.offsetX = event.clientX - rect.left;
          drag.current.offsetY = event.clientY - rect.top;
          drag.current.lastX = event.clientX;
          drag.current.lastY = event.clientY;
          drag.current.lastTime = performance.now();
          drag.current.vx = 0;
          drag.current.vy = 0;
          setActiveId(id);
          event.currentTarget.setPointerCapture(event.pointerId);
        };

        const addCopy = (sourceId) => {
          setCards((prev) => {
            const source = prev.find((card) => card.id === sourceId);
            if (!source) return prev;

            nextId.current += 1;
            const offset = getLoadingCardOffset(prev.length);
            const card = {
              id: nextId.current,
              pos: {
                x: clamp(source.pos.x + offset.x, 0, window.innerWidth - 180),
                y: clamp(source.pos.y + offset.y, 0, window.innerHeight - 80)

            };

            return [...prev, card];

        };

        return React.createElement(
          React.Fragment,
          null,
          cards.map((card, index) =>
            React.createElement(LoadingCard, {
              key: card.id,
              card,
              dragging: activeId === card.id,
              isTop: index === cards.length - 1,
              onPointerDown: startDrag(card.id),

              entranceDelay: motionMode === "calm" ? 0.15 : 0.22,
              motionMode

          )
        );
      }

      function BrailleSpinnerPanel({ motionMode, entranceReady }) {
        const frames = ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"];
        const [frame, setFrame] = useState(0);
        const [ghosts, setGhosts] = useState([]);
        const prefersReducedMotion = useReducedMotion();
        const drag = useDraggablePosition("about_loading_braille_panel_position_v1", getDefaultBraillePanelPos, motionMode);

        useEffect(() => {
          if (prefersReducedMotion) {
            setGhosts([]);
            return;
          }
          const id = window.setInterval(() => {
            setFrame((prev) => {
              setGhosts((prevGhosts) => [prev, ...prevGhosts].slice(0, 3));
              return (prev + 1) % frames.length;
            });
          }, 88);
          return () => window.clearInterval(id);
        }, [prefersReducedMotion]);

        const frameValue = frames[prefersReducedMotion ? 0 : frame];

        return React.createElement(
          motion.div,
          {
            ref: drag.ref,
            className: `braille-panel${drag.dragging ? " dragging" : ""}`,
            style: { left: `${drag.pos.x}px`, top: `${drag.pos.y}px` },
            onPointerDown: drag.onPointerDown,
            initial: { opacity: 0, y: -8, scale: 0.98 },
            animate: { opacity: entranceReady ? 1 : 0, y: entranceReady ? 0 : -8, scale: entranceReady ? 1 : 0.98 },
            transition: {
              duration: motionMode === "calm" ? 0.34 : 0.42,
              delay: motionMode === "calm" ? 0.04 : 0.06,
              ease: [0.22, 1, 0.36, 1]
            },
            "aria-label": "Loading status"
          },
          React.createElement(
            "span",
            { className: "braille-slot" },
            React.createElement("span", { className: "loading-braille", "aria-hidden": "true" }, frameValue)
          ),
          React.createElement(
            "span",
            { className: "braille-slot" },
            React.createElement(
              "span",
              { className: "loading-braille loading-braille-trail", "aria-hidden": "true" },
              ghosts[2] !== undefined
                ? React.createElement("span", { className: "loading-braille-layer loading-braille-ghost-3" }, frames[ghosts[2]])
                : null,
              ghosts[1] !== undefined
                ? React.createElement("span", { className: "loading-braille-layer loading-braille-ghost-2" }, frames[ghosts[1]])
                : null,
              ghosts[0] !== undefined
                ? React.createElement("span", { className: "loading-braille-layer loading-braille-ghost-1" }, frames[ghosts[0]])
                : null,
              React.createElement("span", { className: "loading-braille-layer" }, frameValue)
            )
          )
        );
      }

      function CuratedTitle({ motionMode, entranceReady }) {
        const drag = useDraggablePosition("about_curated_title_position_v1", getDefaultTitlePos, motionMode);
        return React.createElement(
          motion.div,
          {
            ref: drag.ref,
            className: `curated-title${drag.dragging ? " dragging" : ""}`,
            style: { left: `${drag.pos.x}px`, top: `${drag.pos.y}px` },
            onPointerDown: drag.onPointerDown,
            initial: { opacity: 0, y: -12, scale: 0.99 },
            animate: { opacity: entranceReady ? 1 : 0, y: entranceReady ? 0 : -12, scale: entranceReady ? 1 : 0.99 },
            transition: {
              duration: motionMode === "calm" ? 0.38 : 0.5,
              delay: motionMode === "calm" ? 0.1 : 0.14,
              ease: [0.77, 0, 0.175, 1]
            },
            whileTap: { scale: 0.985 }
          },
          "Curated animation."
        );
      }

      function ToastPanel({ motionMode, entranceReady }) {
        const drag = useDraggablePosition("about_toast_panel_position_v2", getDefaultToastPos, motionMode);
        const [mode, setMode] = useState("slide");
        const [toasts, setToasts] = useState([]);
        const idRef = useRef(0);
        const timersRef = useRef(new Map());
        const prefersReducedMotion = useReducedMotion();
        const toastDurationMs = prefersReducedMotion ? 2200 : 3200;
        const utilityEase = [0.22, 1, 0.36, 1];

        const clearToastTimer = (id) => {
          const timer = timersRef.current.get(id);
          if (!timer) return;
          clearTimeout(timer);
          timersRef.current.delete(id);
        };

        const removeToast = (id) => {
          clearToastTimer(id);
          setToasts((prev) => prev.filter((toast) => toast.id !== id));
        };

        const addToast = () => {
          idRef.current += 1;
          const id = idRef.current;
          const createdAt = performance.now();
          setToasts((prev) => {
            const next = [{ id, text: "This is a Sonner toast", createdAt, duration: toastDurationMs }, ...prev].slice(0, 3);
            const keep = new Set(next.map((toast) => toast.id));
            prev.forEach((toast) => {
              if (!keep.has(toast.id)) clearToastTimer(toast.id);
            });
            return next;
          });
          const timer = window.setTimeout(() => removeToast(id), toastDurationMs);
          timersRef.current.set(id, timer);
        };

        const resetToasts = () => {
          timersRef.current.forEach((timer) => clearTimeout(timer));
          timersRef.current.clear();
          setToasts([]);
        };

        useEffect(() => {
          return () => {
            timersRef.current.forEach((timer) => clearTimeout(timer));
            timersRef.current.clear();
          };
        }, []);

        const variants = useMemo(
          () => ({
            initial: (idx) => {
              if (prefersReducedMotion) return { opacity: 0, y: -idx * 10, scale: 1 - idx * 0.01 };
              if (mode === "fade") return { opacity: 0, y: -idx * 10, scale: 1 - idx * 0.015 };
              if (mode === "scale") return { opacity: 0, y: -idx * 10 + 5, scale: 0.86 - idx * 0.012 };
              return { opacity: 0, y: -idx * 10 + 18, scale: 0.97 - idx * 0.015 };
            },
            animate: (idx) => ({
              opacity: 1 - idx * 0.08,
              y: -idx * 10,
              scale: 1 - idx * 0.015
            }),
            exit: (idx) => {
              if (prefersReducedMotion) return { opacity: 0, y: -idx * 10 - 6, scale: 1 - idx * 0.01 };
              if (mode === "fade") return { opacity: 0, y: -idx * 10 - 2, scale: 1 - idx * 0.015 };
              if (mode === "scale") return { opacity: 0, y: -idx * 10 - 8, scale: 0.88 - idx * 0.012 };
              return { opacity: 0, y: -idx * 10 - 14, scale: 0.98 - idx * 0.015 };
            }
          }),
          [mode, prefersReducedMotion]
        );

        const itemTransition = prefersReducedMotion
          ? { duration: 0.12, ease: "easeOut" }
          : mode === "scale"
            ? {
                type: "spring",
                stiffness: motionMode === "calm" ? 200 : 240,
                damping: motionMode === "calm" ? 30 : 28,
                mass: 0.95,
                opacity: { duration: motionMode === "calm" ? 0.14 : 0.18, ease: utilityEase }
              }
            : {
                type: "spring",
                stiffness: motionMode === "calm" ? 250 : 300,
                damping: motionMode === "calm" ? 32 : 30,
                mass: 0.9,
                opacity: { duration: motionMode === "calm" ? 0.16 : 0.2, ease: utilityEase }
              };

        const stopDragOnControl = (event) => {
          event.stopPropagation();
        };

        return React.createElement(
          motion.section,
          {
            ref: drag.ref,
            className: `toast-panel${drag.dragging ? " dragging" : ""}`,
            style: { left: `${drag.pos.x}px`, top: `${drag.pos.y}px` },
            onPointerDown: drag.onPointerDown,
            initial: { opacity: 0, y: 12, scale: 0.99 },
            animate: { opacity: entranceReady ? 1 : 0, y: entranceReady ? 0 : 12, scale: entranceReady ? 1 : 0.99 },
            transition: {
              duration: motionMode === "calm" ? 0.36 : 0.48,
              delay: motionMode === "calm" ? 0.2 : 0.3,
              ease: utilityEase
            },
            "aria-label": "Toast interaction"
          },
          React.createElement(
            "div",
            { className: "toast-stage" },
            React.createElement(
              "div",
              { className: "toast-layer", "aria-live": "polite", "aria-atomic": "true" },
              React.createElement(
                AnimatePresence,
                { initial: false },
                toasts.map((toast, idx) =>
                  React.createElement(
                    motion.article,
                    {
                      key: toast.id,
                      className: `toast-item${idx === 1 ? " depth-1" : ""}${idx === 2 ? " depth-2" : ""}${mode === "fade" ? " fade" : ""}${mode === "scale" ? " scale" : ""}`,
                      custom: idx,
                      layout: "position",
                      initial: "initial",
                      animate: "animate",
                      exit: "exit",
                      variants,
                      transition: itemTransition,
                      style: { zIndex: 30 - idx }
                    },
                    React.createElement(motion.span, {
                      className: "toast-progress",
                      initial: { scaleX: 1 },
                      animate: { scaleX: 0 },
                      transition: {
                        duration: toast.duration / 1000,
                        ease: "linear"
                      }
                    }),
                    React.createElement("span", null, toast.text)
                  )
                )
              )
            )
          ),
          React.createElement(
            "div",
            { className: "toast-controls" },
            React.createElement(
              "div",
              { className: "toast-controls-left" },
              React.createElement(
                "button",
                {
                  className: "toast-control",
                  type: "button",
                  "data-no-drag": "true",
                  onPointerDown: stopDragOnControl,
                  onClick: addToast
                },
                "Add toast"
              ),
              React.createElement(
                "div",
                { className: "toast-select-wrap", "data-no-drag": "true", onPointerDown: stopDragOnControl },
                React.createElement(
                  "select",
                  {
                    className: "toast-control",
                    value: mode,
                    onChange: (e) => setMode(e.target.value),
                    "aria-label": "Transition mode"

                  React.createElement("option", { value: "slide" }, "Transitions"),
                  React.createElement("option", { value: "fade" }, "Fade"),
                  React.createElement("option", { value: "scale" }, "Scale")
                )
              )
            ),
            React.createElement(
              "div",
              { className: "toast-controls-right" },
              React.createElement(
                "button",
                {
                  className: "toast-control toast-reset",
                  type: "button",
                  "data-no-drag": "true",
                  onPointerDown: stopDragOnControl,
                  onClick: resetToasts
                },
                "Reset"
              )
            )
          )
        );
      }

      function App() {
        const motionMode = "normal";
        const [entranceReady, setEntranceReady] = useState(false);

        useEffect(() => {
          const id = requestAnimationFrame(() => setEntranceReady(true));
          return () => cancelAnimationFrame(id);
        }, []);

        return React.createElement(
          React.Fragment,
          null,
          React.createElement(BrailleSpinnerPanel, { motionMode, entranceReady }),
          React.createElement(CuratedTitle, { motionMode, entranceReady }),
          React.createElement(LoadingStack, { motionMode, entranceReady }),
          React.createElement(ToastPanel, { motionMode, entranceReady })
        );
      }

      createRoot(document.getElementById("app")).render(React.createElement(App));
    </script>
  </body>
