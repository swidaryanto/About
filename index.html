<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --panel-bg: #f3f3f3;
        --panel-line: #d6d6d6;
        --spinner-track: #bdbdbd;
        --spinner-head: #3f3f3f;
        --braille-spinner: #4a4a4a;
        --ease-mac: cubic-bezier(0.22, 1, 0.36, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow: hidden;
        background: var(--bg);
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      .loading-card {
        position: fixed;
        width: 180px;
        height: 80px;
        border-radius: 16px;
        border: 1px solid var(--panel-line);
        background: var(--panel-bg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        display: grid;
        place-items: center;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .loading-banner {
        position: fixed;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 22px;
        color: var(--braille-spinner);
        user-select: none;
        pointer-events: auto;
        cursor: grab;
        touch-action: none;
      }

      .loading-banner.dragging {
        cursor: grabbing;
      }

      .loading-braille {
        font-family: "IBM Plex Mono", "SF Mono", "JetBrains Mono", "Cascadia Mono", monospace;
        font-size: 22px;
        line-height: 1;
        letter-spacing: 0;
        text-rendering: geometricPrecision;
      }

      .loading-braille-trail {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.1ch;
        height: 1em;
      }

      .loading-braille-layer {
        position: absolute;
        inset: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .loading-braille-ghost-1 {
        opacity: 0.58;
        transform: translateX(-0.015em);
      }

      .loading-braille-ghost-2 {
        opacity: 0.3;
        transform: translateX(-0.03em);
      }

      .loading-braille-ghost-3 {
        opacity: 0.14;
        transform: translateX(-0.045em);
      }

      .curated-title {
        position: fixed;
        padding: 0;
        color: #171717;
        font-family: "Roboto Flex", "Inter", sans-serif;
        font-size: 28px;
        font-weight: 520;
        letter-spacing: -0.015em;
        line-height: 1;
        cursor: grab;
        user-select: none;
        touch-action: none;
        will-change: transform;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        font-optical-sizing: auto;
        font-variation-settings: "opsz" 28, "wght" 520;
        animation: curatedPulse 4.8s var(--ease-mac) infinite;
      }

      .curated-title.dragging {
        cursor: grabbing;
      }

      .loading-card.dragging {
        cursor: grabbing;
      }

      .spinners {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 47px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 3px solid var(--spinner-track);
        border-top-color: var(--spinner-head);
        animation: spin 760ms linear infinite;
      }

      .spinner:first-child {
        animation-duration: 1520ms;
      }

      .spinner:nth-child(2) {
        animation-duration: 820ms;
      }

      .toast-panel {
        position: fixed;
        width: min(420px, calc(100vw - 44px));
        border-radius: 14px;
        border: 1px solid var(--panel-line);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .toast-panel.dragging {
        cursor: grabbing;
      }

      .toast-stage {
        position: relative;
        height: 170px;
        border-bottom: 1px solid var(--panel-line);
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .toast-layer {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        padding: 14px;
      }

      .toast-item {
        position: absolute;
        left: 14px;
        right: 14px;
        top: 50%;
        border-radius: 12px;
        border: 1px solid #dbdbdb;
        background: #f8f8f8;
        padding: 12px 14px;
        color: #1d1d1d;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.3;
        letter-spacing: -0.005em;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.05),
          0 10px 24px rgba(0, 0, 0, 0.09);
      }

      .toast-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 12px;
      }

      .toast-controls-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast-control {
        height: 36px;
        min-width: 96px;
        padding: 0 10px;
        border: 1px solid var(--panel-line);
        border-radius: 9px;
        background: #f8f8f8;
        color: #232323;
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.005em;
        cursor: pointer;
        transition:
          transform 120ms var(--ease-mac),
          background 180ms var(--ease-mac),
          box-shadow 180ms var(--ease-mac);
      }

      .toast-control:hover {
        background: #efefef;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }

      .toast-control:active {
        transform: scale(0.975);
      }

      .toast-reset {
        min-width: auto;
        padding: 0 4px;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        color: #b25e5e;
      }

      .toast-reset:hover {
        background: transparent;
        box-shadow: none;
        color: #9f4d4d;
      }

      .toast-reset:active {
        transform: scale(0.985);
      }

      .toast-select-wrap {
        position: relative;
      }

      .toast-select-wrap::after {
        content: "";
        position: absolute;
        right: 11px;
        top: 50%;
        width: 6px;
        height: 6px;
        border-right: 1.8px solid #111;
        border-bottom: 1.8px solid #111;
        transform: translateY(-62%) rotate(45deg);
        pointer-events: none;
      }

      select.toast-control {
        appearance: none;
        padding-right: 24px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes curatedPulse {
        0%,
        100% {
          font-variation-settings: "opsz" 28, "wght" 500;
          letter-spacing: -0.015em;
          transform: translateY(0);
        }

        50% {
          font-variation-settings: "opsz" 28, "wght" 760;
          letter-spacing: -0.03em;
          transform: translateY(-0.5px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .curated-title {
          animation: none;
        }

        .loading-braille {
          animation: none;
        }
      }

      @media (max-width: 760px) {
        .loading-card {
          width: 180px;
          border-radius: 14px;
          height: 80px;
        }

        .spinners {
          gap: 30px;
        }

        .spinner {
          width: 21px;
          height: 21px;
          border-width: 3px;
        }

        .toast-panel {
          width: min(420px, calc(100vw - 16px));
        }

        .toast-stage {
          height: 130px;
        }

        .toast-item {
          font-size: 14px;
        }

        .toast-control {
          height: 34px;
          min-width: 92px;
          font-size: 12px;
          padding: 0 8px;
        }

        .loading-banner {
          left: 12px;
          top: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import React, { useEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.2.0";
      import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
      import { AnimatePresence, motion, useReducedMotion } from "https://esm.sh/framer-motion@11.2.10?deps=react@18.2.0";

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getDefaultLoadingPos() {
        return { x: window.innerWidth * 0.5 - 90, y: window.innerHeight * 0.5 - 40 };
      }

      function getDefaultBannerPos() {
        if (window.innerWidth <= 760) return { x: 12, y: 12 };
        return { x: 16, y: 20 };
      }

      function getDefaultBannerTrailPos() {
        if (window.innerWidth <= 760) return { x: 44, y: 12 };
        return { x: 50, y: 20 };
      }

      function getLoadingCardOffset(index) {
        return { x: index * 24, y: index * 18 };
      }

      function getDefaultTitlePos() {
        return { x: window.innerWidth * 0.5 - 110, y: 24 };
      }

      function getDefaultToastPos() {
        const width = Math.min(420, Math.max(240, window.innerWidth - 44));
        const height = 252;
        return { x: window.innerWidth - width - 28, y: window.innerHeight * 0.5 - height * 0.5 };
      }

      function useDraggablePosition(key, defaultPosFactory) {
        const ref = useRef(null);
        const [pos, setPos] = useState(() => defaultPosFactory());
        const [dragging, setDragging] = useState(false);
        const drag = useRef({ active: false, offsetX: 0, offsetY: 0 });

        useEffect(() => {
          const raw = localStorage.getItem(key);
          if (!raw) return;
          try {
            const parsed = JSON.parse(raw);
            if (typeof parsed.x === "number" && typeof parsed.y === "number") {
              setPos({ x: parsed.x, y: parsed.y });
            }
          } catch {
            localStorage.removeItem(key);
          }
        }, [key]);

        useEffect(() => {
          localStorage.setItem(key, JSON.stringify(pos));
        }, [key, pos]);

        useEffect(() => {
          const onMove = (event) => {
            if (!drag.current.active || !ref.current) return;
            const rect = ref.current.getBoundingClientRect();
            const left = event.clientX - drag.current.offsetX;
            const top = event.clientY - drag.current.offsetY;
            const nextX = clamp(left, 0, window.innerWidth - rect.width);
            const nextY = clamp(top, 0, window.innerHeight - rect.height);
            setPos({ x: nextX, y: nextY });
          };

          const onUp = () => {
            drag.current.active = false;
            setDragging(false);
          };

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp);
          window.addEventListener("pointercancel", onUp);
          return () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            window.removeEventListener("pointercancel", onUp);
          };
        }, []);

        useEffect(() => {
          const onResize = () => {
            if (!ref.current) return;
            const rect = ref.current.getBoundingClientRect();
            setPos((prev) => ({
              x: clamp(prev.x, 0, window.innerWidth - rect.width),
              y: clamp(prev.y, 0, window.innerHeight - rect.height)
            }));
          };
          window.addEventListener("resize", onResize);
          return () => window.removeEventListener("resize", onResize);
        }, []);

        const onPointerDown = (event) => {
          if (!ref.current) return;
          const rect = ref.current.getBoundingClientRect();
          drag.current.active = true;
          drag.current.offsetX = event.clientX - rect.left;
          drag.current.offsetY = event.clientY - rect.top;
          setDragging(true);
          event.currentTarget.setPointerCapture(event.pointerId);
        };

        return { ref, pos, dragging, onPointerDown };
      }

      function LoadingCard({ card, dragging, isTop, onPointerDown, onDuplicate }) {
        return React.createElement(
          "section",
          {
            className: `loading-card${dragging ? " dragging" : ""}`,
            style: {
              left: `${card.pos.x}px`,
              top: `${card.pos.y}px`,
              zIndex: dragging || isTop ? 3 : 2
            },
            onPointerDown,
            onDoubleClick: onDuplicate,
            "aria-label": "Loading"
          },
          React.createElement(
            "div",
            { className: "spinners" },
            React.createElement("div", { className: "spinner", "aria-hidden": "true" }),
            React.createElement("div", { className: "spinner", "aria-hidden": "true" })
          )
        );
      }

      function LoadingStack() {
        const [cards, setCards] = useState(() => [{ id: 1, pos: getDefaultLoadingPos() }]);
        const drag = useRef({ active: false, id: null, offsetX: 0, offsetY: 0 });
        const [activeId, setActiveId] = useState(null);
        const nextId = useRef(1);

        useEffect(() => {
          const onMove = (event) => {
            if (!drag.current.active) return;
            setCards((prev) =>
              prev.map((card) => {
                if (card.id !== drag.current.id) return card;
                const nextX = clamp(event.clientX - drag.current.offsetX, 0, window.innerWidth - 180);
                const nextY = clamp(event.clientY - drag.current.offsetY, 0, window.innerHeight - 80);
                return { ...card, pos: { x: nextX, y: nextY } };
              })
            );
          };

          const onUp = () => {
            drag.current.active = false;
            drag.current.id = null;
            setActiveId(null);
          };

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp);
          window.addEventListener("pointercancel", onUp);
          return () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            window.removeEventListener("pointercancel", onUp);
          };
        }, []);

        const startDrag = (id) => (event) => {
          if (event.button !== 0) return;
          const rect = event.currentTarget.getBoundingClientRect();
          drag.current.active = true;
          drag.current.id = id;
          drag.current.offsetX = event.clientX - rect.left;
          drag.current.offsetY = event.clientY - rect.top;
          setActiveId(id);
          event.currentTarget.setPointerCapture(event.pointerId);
        };

        const addCopy = (sourceId) => {
          setCards((prev) => {
            const source = prev.find((card) => card.id === sourceId);
            if (!source) return prev;

            nextId.current += 1;
            const offset = getLoadingCardOffset(prev.length);
            const card = {
              id: nextId.current,
              pos: {
                x: clamp(source.pos.x + offset.x, 0, window.innerWidth - 180),
                y: clamp(source.pos.y + offset.y, 0, window.innerHeight - 80)
              }
            };

            return [...prev, card];
          });
        };

        return React.createElement(
          React.Fragment,
          null,
          cards.map((card, index) =>
            React.createElement(LoadingCard, {
              key: card.id,
              card,
              dragging: activeId === card.id,
              isTop: index === cards.length - 1,
              onPointerDown: startDrag(card.id),
              onDuplicate: () => addCopy(card.id)
            })
          )
        );
      }

      function BrailleSpinner({ storageKey, defaultPosFactory, trail }) {
        const frames = ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"];
        const [frame, setFrame] = useState(0);
        const [ghosts, setGhosts] = useState([]);
        const prefersReducedMotion = useReducedMotion();
        const drag = useDraggablePosition(storageKey, defaultPosFactory);

        useEffect(() => {
          if (!trail) {
            setGhosts([]);
            return;
          }
          if (prefersReducedMotion) {
            setGhosts([]);
          }
        }, [trail, prefersReducedMotion]);

        useEffect(() => {
          if (prefersReducedMotion) return;
          const id = window.setInterval(() => {
            setFrame((prev) => {
              if (trail) {
                setGhosts((prevGhosts) => [prev, ...prevGhosts].slice(0, 3));
              }
              return (prev + 1) % frames.length;
            });
          }, 88);
          return () => window.clearInterval(id);
        }, [prefersReducedMotion, trail]);

        const frameValue = frames[prefersReducedMotion ? 0 : frame];

        return React.createElement(
          "div",
          {
            ref: drag.ref,
            className: `loading-banner${drag.dragging ? " dragging" : ""}`,
            style: { left: `${drag.pos.x}px`, top: `${drag.pos.y}px` },
            onPointerDown: drag.onPointerDown,
            "aria-label": "Loading status"
          },
          trail
            ? React.createElement(
                "span",
                { className: "loading-braille loading-braille-trail", "aria-hidden": "true" },
                ghosts[2] !== undefined
                  ? React.createElement("span", { className: "loading-braille-layer loading-braille-ghost-3" }, frames[ghosts[2]])
                  : null,
                ghosts[1] !== undefined
                  ? React.createElement("span", { className: "loading-braille-layer loading-braille-ghost-2" }, frames[ghosts[1]])
                  : null,
                ghosts[0] !== undefined
                  ? React.createElement("span", { className: "loading-braille-layer loading-braille-ghost-1" }, frames[ghosts[0]])
                  : null,
                React.createElement("span", { className: "loading-braille-layer" }, frameValue)
              )
            : React.createElement("span", { className: "loading-braille", "aria-hidden": "true" }, frameValue)
        );
      }

      function CuratedTitle() {
        const drag = useDraggablePosition("about_curated_title_position_v1", getDefaultTitlePos);
        return React.createElement(
          motion.div,
          {
            ref: drag.ref,
            className: `curated-title${drag.dragging ? " dragging" : ""}`,
            style: { left: `${drag.pos.x}px`, top: `${drag.pos.y}px` },
            onPointerDown: drag.onPointerDown,
            animate: {
              opacity: [0.92, 1, 0.92],
              textShadow: [
                "0 1px 2px rgba(0,0,0,0.08)",
                "0 2px 4px rgba(0,0,0,0.12)",
                "0 1px 2px rgba(0,0,0,0.08)"
              ]
            },
            transition: {
              duration: 3.2,
              ease: "easeInOut",
              repeat: Infinity
            },
            whileTap: { scale: 0.985 }
          },
          "Curated animation."
        );
      }

      function ToastPanel() {
        const drag = useDraggablePosition("about_toast_panel_position_v2", getDefaultToastPos);
        const [mode, setMode] = useState("slide");
        const [toasts, setToasts] = useState([]);
        const idRef = useRef(0);
        const prefersReducedMotion = useReducedMotion();

        const addToast = () => {
          idRef.current += 1;
          setToasts((prev) => [{ id: idRef.current, text: "This is a Sonner toast" }, ...prev].slice(0, 3));
        };

        const resetToasts = () => {
          setToasts([]);
        };

        const variants = useMemo(
          () => ({
            initial: (idx) => {
              if (prefersReducedMotion) return { opacity: 0, y: -idx * 10, scale: 1 - idx * 0.01 };
              if (mode === "fade") return { opacity: 0, y: -idx * 10, scale: 1 - idx * 0.015 };
              if (mode === "scale") return { opacity: 0, y: -idx * 10 + 5, scale: 0.86 - idx * 0.012 };
              return { opacity: 0, y: -idx * 10 + 18, scale: 0.97 - idx * 0.015 };
            },
            animate: (idx) => ({
              opacity: 1 - idx * 0.08,
              y: -idx * 10,
              scale: 1 - idx * 0.015
            }),
            exit: (idx) => {
              if (prefersReducedMotion) return { opacity: 0, y: -idx * 10 - 6, scale: 1 - idx * 0.01 };
              if (mode === "fade") return { opacity: 0, y: -idx * 10 - 2, scale: 1 - idx * 0.015 };
              if (mode === "scale") return { opacity: 0, y: -idx * 10 - 8, scale: 0.88 - idx * 0.012 };
              return { opacity: 0, y: -idx * 10 - 14, scale: 0.98 - idx * 0.015 };
            }
          }),
          [mode, prefersReducedMotion]
        );

        const itemTransition = prefersReducedMotion
          ? { duration: 0.12, ease: "easeOut" }
          : mode === "scale"
            ? {
                type: "spring",
                stiffness: 240,
                damping: 28,
                mass: 0.95,
                opacity: { duration: 0.18, ease: [0.22, 1, 0.36, 1] }
              }
            : {
                type: "spring",
                stiffness: 300,
                damping: 30,
                mass: 0.9,
                opacity: { duration: 0.2, ease: [0.22, 1, 0.36, 1] }
              };

        const stopDragOnControl = (event) => {
          event.stopPropagation();
        };

        return React.createElement(
          "section",
          {
            ref: drag.ref,
            className: `toast-panel${drag.dragging ? " dragging" : ""}`,
            style: { left: `${drag.pos.x}px`, top: `${drag.pos.y}px` },
            onPointerDown: drag.onPointerDown,
            "aria-label": "Toast interaction"
          },
          React.createElement(
            "div",
            { className: "toast-stage" },
            React.createElement(
              "div",
              { className: "toast-layer", "aria-live": "polite", "aria-atomic": "true" },
              React.createElement(
                AnimatePresence,
                { initial: false },
                toasts.map((toast, idx) =>
                  React.createElement(
                    motion.article,
                    {
                      key: toast.id,
                      className: `toast-item${idx === 1 ? " depth-1" : ""}${idx === 2 ? " depth-2" : ""}${mode === "fade" ? " fade" : ""}${mode === "scale" ? " scale" : ""}`,
                      custom: idx,
                      layout: "position",
                      initial: "initial",
                      animate: "animate",
                      exit: "exit",
                      variants,
                      transition: itemTransition,
                      style: { zIndex: 30 - idx }
                    },
                    toast.text
                  )
                )
              )
            )
          ),
          React.createElement(
            "div",
            { className: "toast-controls" },
            React.createElement(
              "div",
              { className: "toast-controls-left" },
              React.createElement(
                "button",
                {
                  className: "toast-control",
                  type: "button",
                  "data-no-drag": "true",
                  onPointerDown: stopDragOnControl,
                  onClick: addToast
                },
                "Add toast"
              ),
              React.createElement(
                "div",
                { className: "toast-select-wrap", "data-no-drag": "true", onPointerDown: stopDragOnControl },
                React.createElement(
                  "select",
                  {
                    className: "toast-control",
                    value: mode,
                    onChange: (e) => setMode(e.target.value),
                    "aria-label": "Transition mode"
