<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <style>
      :root {
        --bg: #ffffff;
        --panel-bg: #f3f3f3;
        --panel-line: #d6d6d6;
        --spinner-track: #bdbdbd;
        --spinner-head: #3f3f3f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 30% 40% 30%;
        align-items: center;
        overflow: hidden;
        background: var(--bg);
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      .loading-card {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 180px;
        height: 80px;
        border-radius: 16px;
        border: 2px solid var(--panel-line);
        background: var(--panel-bg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        display: grid;
        place-items: center;
        transform: translate(-50%, -50%);
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .loading-card.dragging {
        cursor: grabbing;
      }

      .spinners {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 47px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 4px solid var(--spinner-track);
        border-top-color: var(--spinner-head);
        animation: spin 760ms linear infinite;
      }

      .spinner:first-child {
        animation-duration: 1520ms;
      }

      .spinner:nth-child(2) {
        animation-duration: 820ms;
      }

      .toast-panel {
        position: fixed;
        right: 28px;
        top: 50%;
        width: min(420px, calc(100vw - 44px));
        border-radius: 14px;
        border: 2px solid var(--panel-line);
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        transform: translateY(-50%);
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .toast-panel.dragging {
        cursor: grabbing;
      }

      .toast-stage {
        position: relative;
        height: 170px;
        border-bottom: 2px solid var(--panel-line);
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .toast-layer {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        padding: 14px;
      }

      .toast-item {
        position: absolute;
        left: 14px;
        right: 14px;
        top: 50%;
        border-radius: 12px;
        border: 2px solid #dbdbdb;
        background: #f8f8f8;
        padding: 12px 14px;
        color: #1d1d1d;
        font-family: "Inter", "Segoe UI", sans-serif;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.3;
        letter-spacing: -0.005em;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        opacity: var(--stack-opacity, 1);
        transform: translate3d(0, calc(-50% + var(--stack-y, 0px)), 0) scale(var(--stack-scale, 1));
        z-index: var(--stack-z, 1);
        will-change: transform, opacity;
        transition:
          opacity 190ms cubic-bezier(0.23, 1, 0.32, 1),
          transform 300ms cubic-bezier(0.23, 1, 0.32, 1),
          background-color 180ms ease;
      }

      .toast-item.is-new {
        opacity: 0;
        transform: translate3d(0, calc(-50% + 22px), 0) scale(0.97);
      }

      .toast-item.is-leaving {
        opacity: 0;
        transform: translate3d(0, calc(-50% - 20px), 0) scale(0.97);
      }

      .toast-item.depth-1 {
        background: #f5f5f5;
      }

      .toast-item.depth-2 {
        background: #f2f2f2;
      }

      .toast-item.fade {
        transition:
          opacity 170ms cubic-bezier(0.23, 1, 0.32, 1),
          transform 170ms cubic-bezier(0.23, 1, 0.32, 1);
      }

      .toast-item.scale {
        transition:
          opacity 190ms cubic-bezier(0.23, 1, 0.32, 1),
          transform 340ms cubic-bezier(0.23, 1, 0.32, 1);
      }

      .toast-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px;
      }

      .toast-control {
        height: 36px;
        min-width: 96px;
        padding: 0 10px;
        border: 2px solid var(--panel-line);
        border-radius: 9px;
        background: #f8f8f8;
        color: #232323;
        font-family: "Inter", "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.005em;
        cursor: pointer;
        transition: transform 120ms ease, background 140ms ease;
      }

      .toast-control:hover {
        background: #efefef;
      }

      .toast-control:active {
        transform: scale(0.98);
      }

      .toast-select-wrap {
        position: relative;
      }

      .toast-select-wrap::after {
        content: "";
        position: absolute;
        right: 11px;
        top: 50%;
        width: 6px;
        height: 6px;
        border-right: 1.8px solid #111;
        border-bottom: 1.8px solid #111;
        transform: translateY(-62%) rotate(45deg);
        pointer-events: none;
      }

      select.toast-control {
        appearance: none;
        padding-right: 24px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 760px) {
        body {
          grid-template-columns: 8% 84% 8%;
        }

        .loading-card {
          width: 100%;
          border-radius: 14px;
          height: min(20vh, 120px);
        }

        .spinners {
          gap: 30px;
        }

        .spinner {
          width: 21px;
          height: 21px;
          border-width: 3px;
        }

        .toast-panel {
          right: 8px;
          left: 8px;
          top: auto;
          bottom: 8px;
          width: auto;
          transform: none;
        }

        .toast-stage {
          height: 130px;
        }

        .toast-item {
          font-size: 14px;
        }

        .toast-control {
          height: 34px;
          min-width: 92px;
          font-size: 12px;
          padding: 0 8px;
        }
      }
    </style>
  </head>
  <body>
    <section class="loading-card" id="loadingCard" aria-label="Loading">
      <div class="spinners">
        <div class="spinner" aria-hidden="true"></div>
        <div class="spinner" aria-hidden="true"></div>
      </div>
    </section>
    <section class="toast-panel" id="toastPanel" aria-label="Toast interaction">
      <div class="toast-stage">
        <div class="toast-layer" id="toastLayer" aria-live="polite" aria-atomic="true"></div>
      </div>
      <div class="toast-controls">
        <button class="toast-control" id="addToastBtn" type="button">Add toast</button>
        <div class="toast-select-wrap">
          <select class="toast-control" id="transitionSelect" aria-label="Transition mode">
            <option value="slide">Transitions</option>
            <option value="fade">Fade</option>
            <option value="scale">Scale</option>
          </select>
        </div>
      </div>
    </section>
    <script>
      const card = document.getElementById("loadingCard");
      const storageKey = "about_loading_card_position_v1";

      function cardRect() {
        return card.getBoundingClientRect();
      }

      function clampPosition(left, top) {
        const rect = cardRect();
        const minLeft = 0;
        const minTop = 0;
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;
        return {
          left: Math.max(minLeft, Math.min(maxLeft, left)),
          top: Math.max(minTop, Math.min(maxTop, top))
        };
      }

      function setCardPosition(left, top) {
        const pos = clampPosition(left, top);
        card.style.left = pos.left + "px";
        card.style.top = pos.top + "px";
        card.style.transform = "none";
      }

      function savePosition() {
        const rect = cardRect();
        const x = rect.left / window.innerWidth;
        const y = rect.top / window.innerHeight;
        localStorage.setItem(storageKey, JSON.stringify({ x, y }));
      }

      function restorePosition() {
        const raw = localStorage.getItem(storageKey);
        if (!raw) {
          return;
        }
        try {
          const { x, y } = JSON.parse(raw);
          const left = x * window.innerWidth;
          const top = y * window.innerHeight;
          setCardPosition(left, top);
        } catch (_error) {
          localStorage.removeItem(storageKey);
        }
      }

      restorePosition();

      let dragging = false;
      let offsetX = 0;
      let offsetY = 0;

      card.addEventListener("pointerdown", (event) => {
        const rect = cardRect();
        dragging = true;
        offsetX = event.clientX - rect.left;
        offsetY = event.clientY - rect.top;
        card.classList.add("dragging");
        card.setPointerCapture(event.pointerId);
      });

      card.addEventListener("pointermove", (event) => {
        if (!dragging) {
          return;
        }
        const left = event.clientX - offsetX;
        const top = event.clientY - offsetY;
        setCardPosition(left, top);
      });

      function stopDrag() {
        if (!dragging) {
          return;
        }
        dragging = false;
        card.classList.remove("dragging");
        savePosition();
      }

      card.addEventListener("pointerup", stopDrag);
      card.addEventListener("pointercancel", stopDrag);

      window.addEventListener("resize", () => {
        const rect = cardRect();
        setCardPosition(rect.left, rect.top);
        savePosition();
      });

      const toastLayer = document.getElementById("toastLayer");
      const addToastBtn = document.getElementById("addToastBtn");
      const transitionSelect = document.getElementById("transitionSelect");
      const toastPanel = document.getElementById("toastPanel");
      const toastPanelStorageKey = "about_toast_panel_position_v1";
      const stack = [];
      const toastElements = new Map();
      let toastCounter = 0;
      const MAX_STACK = 3;

      function ensureToastElement(item) {
        let el = toastElements.get(item.id);
        if (!el) {
          el = document.createElement("article");
          el.className = "toast-item is-new";
          el.textContent = item.text;
          toastLayer.appendChild(el);
          toastElements.set(item.id, el);
          requestAnimationFrame(() => {
            el.classList.remove("is-new");
          });
        }
        return el;
      }

      function applyTransitionMode(el) {
        el.classList.remove("fade", "scale");
        const mode = transitionSelect.value;
        if (mode === "fade") el.classList.add("fade");
        if (mode === "scale") el.classList.add("scale");
      }

      function layoutStack() {
        stack.forEach((item, index) => {
          const el = ensureToastElement(item);
          applyTransitionMode(el);
          el.classList.toggle("depth-1", index === 1);
          el.classList.toggle("depth-2", index === 2);
          el.style.setProperty("--stack-y", `${index * -12}px`);
          el.style.setProperty("--stack-scale", `${1 - index * 0.02}`);
          el.style.setProperty("--stack-opacity", `${1 - index * 0.08}`);
          el.style.setProperty("--stack-z", `${30 - index}`);
        });
      }

      function removeToast(id) {
        const el = toastElements.get(id);
        if (!el) return;
        el.classList.add("is-leaving");
        setTimeout(() => {
          if (el.parentNode) el.parentNode.removeChild(el);
          toastElements.delete(id);
        }, 210);
      }

      addToastBtn.addEventListener("click", () => {
        const toast = { id: ++toastCounter, text: "This is a Sonner toast" };
        stack.unshift(toast);
        if (stack.length > MAX_STACK) {
          const removed = stack.pop();
          if (removed) removeToast(removed.id);
        }
        layoutStack();
      });

      transitionSelect.addEventListener("change", () => {
        layoutStack();
      });

      function toastPanelRect() {
        return toastPanel.getBoundingClientRect();
      }

      function clampToastPanel(left, top) {
        const rect = toastPanelRect();
        const minLeft = 0;
        const minTop = 0;
        const maxLeft = window.innerWidth - rect.width;
        const maxTop = window.innerHeight - rect.height;
        return {
          left: Math.max(minLeft, Math.min(maxLeft, left)),
          top: Math.max(minTop, Math.min(maxTop, top))
        };
      }

      function setToastPanelPosition(left, top) {
        const pos = clampToastPanel(left, top);
        toastPanel.style.left = pos.left + "px";
        toastPanel.style.top = pos.top + "px";
        toastPanel.style.right = "auto";
        toastPanel.style.bottom = "auto";
        toastPanel.style.transform = "none";
      }

      function saveToastPanelPosition() {
        const rect = toastPanelRect();
        const x = rect.left / window.innerWidth;
        const y = rect.top / window.innerHeight;
        localStorage.setItem(toastPanelStorageKey, JSON.stringify({ x, y }));
      }

      function restoreToastPanelPosition() {
        const raw = localStorage.getItem(toastPanelStorageKey);
        if (!raw) {
          return;
        }
        try {
          const { x, y } = JSON.parse(raw);
          setToastPanelPosition(x * window.innerWidth, y * window.innerHeight);
        } catch (_error) {
          localStorage.removeItem(toastPanelStorageKey);
        }
      }

      restoreToastPanelPosition();

      let toastDragging = false;
      let toastOffsetX = 0;
      let toastOffsetY = 0;

      toastPanel.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".toast-control")) {
          return;
        }
        const rect = toastPanelRect();
        toastDragging = true;
        toastOffsetX = event.clientX - rect.left;
        toastOffsetY = event.clientY - rect.top;
        toastPanel.classList.add("dragging");
        toastPanel.setPointerCapture(event.pointerId);
      });

      toastPanel.addEventListener("pointermove", (event) => {
        if (!toastDragging) {
          return;
        }
        setToastPanelPosition(event.clientX - toastOffsetX, event.clientY - toastOffsetY);
      });

      function stopToastDrag() {
        if (!toastDragging) {
          return;
        }
        toastDragging = false;
        toastPanel.classList.remove("dragging");
        saveToastPanelPosition();
      }

      toastPanel.addEventListener("pointerup", stopToastDrag);
      toastPanel.addEventListener("pointercancel", stopToastDrag);

      window.addEventListener("resize", () => {
        const rect = toastPanelRect();
        setToastPanelPosition(rect.left, rect.top);
        saveToastPanelPosition();
      });
    </script>
  </body>
</html>
